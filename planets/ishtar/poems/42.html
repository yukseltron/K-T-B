<main>
  <h1>42</h1>

  <p class="verse">What beauty I see
Nestled softly before me.</p>

  <p class="verse">The early morning laze
Locked in a slow sweet craze.</p>

  <p class="verse">Crawling into the cover
I join you, my lover.</p>
</main>
