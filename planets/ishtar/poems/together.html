<a class="back" href="../">&#8592; Ishtar</a>
<main>
  <h1>Together</h1>

  <p class="verse">A blissful caress on the lips
I taste the pleasant sweetness
Always wanting more than sips.</p>

  <p class="verse">I fall asleep in that eternal moment
Preserving the seconds forever
Never letting anything go absent.</p>

  <p class="verse">To ache is to miss
A pain so great
The only cure is to kiss.</p>
</main>
